name: Bug report
description: Report a reproducible AISRT problem.
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        请先删除日志、截图和路径中的个人信息，不要上传未授权公开的媒体文件或字幕。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序写出命令或界面操作。
      placeholder: |
        1. 运行 ...
        2. 选择 ...
        3. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 说明你原本期望发生什么。
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、Python 版本、是否使用 GPU、PyTorch/CUDA 版本。
      placeholder: |
        OS:
        Python:
        GPU:
        PyTorch:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已脱敏日志
      description: 粘贴最小必要日志；请替换个人路径、真实文件名和任何密钥。
      render: text
