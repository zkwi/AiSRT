name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install "PyQt6>=6.7,<7" "pytest>=8,<10" "build>=1.3,<2" "setuptools>=70.1,<82"
          python -m pip install -e . --no-deps

      - name: Run tests
        run: python -m pytest -q

      - name: Compile sources
        run: python -m compileall -q aisrt tests

      - name: Check entry points
        run: |
          python -m aisrt --help
          python -m aisrt.gui --check

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Check whitespace
        run: git diff --check
